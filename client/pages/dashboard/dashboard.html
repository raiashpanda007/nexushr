<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen font-sans antialiased selection:bg-blue-500 selection:text-white flex">
  <app-sidebar></app-sidebar>

  <main id="main-content" class="flex-1 ml-64 min-h-screen transition-all duration-300 ease-in-out">
    <app-header></app-header>

    <div id="content-area" class="p-6">
      <app-employees-view class="view-section hidden"></app-employees-view>
      <app-departments-view class="view-section hidden"></app-departments-view>
      <app-skills-view class="view-section hidden"></app-skills-view>
      <app-leaves-view class="view-section hidden"></app-leaves-view>
      <app-attendance-view class="view-section hidden"></app-attendance-view>
      <app-salaries-view class="view-section hidden"></app-salaries-view>
      <app-payroll-view class="view-section hidden"></app-payroll-view>
      <app-analysis-view class="view-section hidden"></app-analysis-view>
      <app-edit-salary-modal></app-edit-salary-modal>
    </div>
  </main>



  <script type="module" src="./dashboard.js"></script>
</body>


</html>
